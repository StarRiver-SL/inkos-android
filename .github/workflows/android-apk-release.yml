name: Android APK Release

on:
  push:
    tags:
      - "apk-v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Update channel"
        required: true
        default: "stable"
      prerelease:
        description: "Create a prerelease"
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      APK_ASSET_NAME: inkos-studio.apk
      ANDROID_NODE_RUNTIME_URL: https://github.com/Scl-Ywr/inkos/releases/download/android-node-runtime-v1/inkos-android-node-runtime-arm64-v8a.zip
      ANDROID_NODE_RUNTIME_SHA256: 2b7c1cc4d7b49ed8dd9d07577e5d7da67d70759c47230a9f1d851007ad1f3521
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/packages/studio/android/app/release.keystore
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Use runner Gradle settings
        run: |
          sed -i.bak '/^org\.gradle\.java\.home=/d' packages/studio/android/gradle.properties
          sed -i.bak '/maven\.aliyun\.com/d' packages/studio/android/build.gradle

      - name: Verify release signing secrets
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for a self-hosted APK update release."
              exit 1
            fi
          done

      - name: Decode release keystore
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH"

      - name: Download Android Node runtime
        run: |
          set -euo pipefail
          runtime_zip="$RUNNER_TEMP/inkos-android-node-runtime-arm64-v8a.zip"
          curl -fL "$ANDROID_NODE_RUNTIME_URL" -o "$runtime_zip"
          actual_sha="$(sha256sum "$runtime_zip" | awk '{print $1}')"
          if [ "$actual_sha" != "$ANDROID_NODE_RUNTIME_SHA256" ]; then
            echo "::error::Android Node runtime checksum mismatch: $actual_sha"
            exit 1
          fi
          mkdir -p packages/studio/android/app/src/main/jniLibs/arm64-v8a
          unzip -o "$runtime_zip" -d packages/studio/android/app/src/main/jniLibs/arm64-v8a
          test -s packages/studio/android/app/src/main/jniLibs/arm64-v8a/libnode.so
          test -s packages/studio/android/app/src/main/jniLibs/arm64-v8a/libc++_shared.so

      - run: pnpm install --frozen-lockfile

      - name: Verify official baseline and release checks
        run: |
          git fetch https://github.com/Narcooo/inkos.git refs/tags/v1.5.0:refs/tags/v1.5.0 --force
          pnpm audit:upstream
          pnpm audit:semantic-patterns
          pnpm typecheck
          pnpm test

      - name: Build Android web and Node runtime assets
        working-directory: packages/studio
        run: |
          pnpm run android:sync
          pnpm run android:runtime:audit

      - name: Build signed release APK
        working-directory: packages/studio/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p dist/android-release
          cp packages/studio/android/app/build/outputs/apk/release/app-release.apk "dist/android-release/$APK_ASSET_NAME"
          node scripts/generate-android-update-manifest.mjs \
            --apk "dist/android-release/$APK_ASSET_NAME" \
            --out dist/android-release/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --asset-name "$APK_ASSET_NAME" \
            --channel "${{ github.event.inputs.channel || 'stable' }}"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/android-release/${{ env.APK_ASSET_NAME }}
            dist/android-release/update.json
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease || false }}
